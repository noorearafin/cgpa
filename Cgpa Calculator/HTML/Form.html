<!DOCTYPE html>
<html lang="en">
<head>
<title>form </title>
</head>
<body>
<h2>Registration Form </h2>
<form>
<div>

<label for="fullname">FullName:</label>
<input type="text" name="fullname" id="fullname">
</div><br>

<div>

<label for="email">Email:</label>
<input type="email" name="email" id="email">

</div><br>

<div>
<label for="password">Password:</label>
<input type="password" name="password" id="password">
</div><br>

<div>
<label for="dob">Date Of Birth:</label>
<input type="date" name="dob" id="dob">
</div><br>

<div>
<label for="photo">Choose your photo:</label>
<input type="file" name="photo" id="photo">
</div><br>


<div>
<label for="gender">Gender:</label>
<input type="radio" name="gender" id="gender" value="male">Male 
<input type="radio" name="gender" id="gender" value="female">Female

</div><br>

<div>
<label for="religion">Religion:</label>
<input type="checkbox" name="c1" id="islam" value="islam">Islam
<input type="checkbox" name="c1" id="hindu" value="hindu">Hindu
<input type="checkbox" name="c1" id="christianity" value="christianity">Christianityhristianity
<input type="checkbox" name="c1" id="buddhism" value="buddhism">Buddhism


</div><br>

<div>
<label for="department">Department:</label>
<Select name="department">
<option value ="cse">CSE</option>
<option value ="eee">EEE</option>
<option value ="architecture">Architecture</option>
</Select>
</div>

<div>
<label for ="message">Massage </label><br>
<textarea cols = "50" rows ="20" > </textarea>
</div>

<div>
<input type ="submit" value ="Register">
<input type ="reset" value ="Clear">
</div>










</form>
</body>
</html>
